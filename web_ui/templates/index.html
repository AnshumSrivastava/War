<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Deck - Tactical Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar - Tools -->
        <aside class="sidebar tools-panel glass">
            <div class="sidebar-header">
                <i class="fa-solid fa-satellite-dish pulse-icon"></i>
                <h2>THEATER COMMAND</h2>
            </div>
            <div class="tool-section">
                <h3>Active Tool</h3>
                <div class="tool-grid">
                    <button class="tool-btn active" data-tool="cursor" title="Select">
                        <i class="fa-solid fa-arrow-pointer"></i>
                        <span>Select</span>
                    </button>
                    <button class="tool-btn" data-tool="place_agent" title="Deploy Units">
                        <i class="fa-solid fa-person-military-rifle"></i>
                        <span>Deploy</span>
                    </button>
                    <button class="tool-btn" data-tool="draw_zone" title="Define Area">
                        <i class="fa-solid fa-draw-polygon"></i>
                        <span>Zone</span>
                    </button>
                    <button class="tool-btn" data-tool="paint_terrain" title="Paint Terrain">
                        <i class="fa-solid fa-paint-roller"></i>
                        <span>Paint</span>
                    </button>
                </div>
            </div>

            <div class="tool-section side-selection" id="deploySettings" style="display: none; transform: translateY(-10px); opacity: 0; transition: all 0.3s ease;">
                <h3>Allegiance</h3>
                <div class="segmented-control">
                    <input type="radio" id="side-attacker" name="side" value="Attacker" checked>
                    <label for="side-attacker" class="segment red">Attacker</label>
                    <input type="radio" id="side-defender" name="side" value="Defender">
                    <label for="side-defender" class="segment blue">Defender</label>
                </div>
            </div>
            
            <div class="tool-section">
                <h3>Scene Hierarchy</h3>
                <ul class="layer-list" id="layerList">
                    <li class="layer-item"><i class="fa-solid fa-layer-group"></i> Map Base</li>
                </ul>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container" id="mapContainer">
            <canvas id="hexCanvas"></canvas>
            
            <div class="top-bar glass">
                <div class="status-indicator">
                    <span class="status-dot"></span> LINK ACTIVE
                </div>
                <div class="view-controls">
                    <button class="icon-btn" id="btnZoomIn"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                    <button class="icon-btn" id="btnZoomOut"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                    <button class="icon-btn" id="btnResetCam"><i class="fa-solid fa-crosshairs"></i></button>
                </div>
            </div>
        </main>
        
        <!-- Right Panel - Properties -->
        <aside class="sidebar properties-panel glass">
            <div class="sidebar-header">
                <i class="fa-solid fa-sliders"></i>
                <h2>PROPERTIES</h2>
            </div>
            <div id="inspectorPanel" class="inspector-content">
                <div class="empty-state">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <p>Select a hexagon or unit to inspect its tactical telemetry.</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Interactive script -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
